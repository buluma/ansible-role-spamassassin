---
- name: Prepare
  hosts: all
  become: true
  gather_facts: false
  roles:
    - role: buluma.bootstrap
    - role: buluma.core_dependencies
    - role: buluma.cron
    - logrotate_entries:
        - missingok: true
          name: spamassassin
          path: /var/log/spamassassin
      role: buluma.logrotate
    - role: buluma.rsyslog
